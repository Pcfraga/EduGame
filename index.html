<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>EduGame - Aprenda Jogando!</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%8E%AE%3C/text%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="logo">
      🎮 EduGame
    </div>
    
    <p class="logo-subtitle">Aprenda Jogando!</p>

    <div class="menu">

      <button class="menu-btn menu-home" onclick="showScreen('dashboard')">
        🏠 <span>Início</span>
      </button>

      <button class="menu-btn menu-games" onclick="showScreen('gamesHub')">
        🎮 <span>Jogos</span>
      </button>

      <button class="menu-btn menu-ranking" onclick="showScreen('ranking')">
        🏆 <span>Ranking</span>
      </button>

      <hr class="menu-divider"></hr>

      <button class="menu-btn menu-create" onclick="showScreen('gameBuilder')">
        🛠️ <span>Criar Jogos</span>
      </button>

      <button class="menu-btn menu-ai" onclick="showScreen('ai')">
        🤖 <span>IA Mágica</span>
      </button>

    </div>

  </div>

  <!-- MAIN -->
  <div class="main" id="main"></div>

  <script type="module" src="js/app.js"></script>

</body>

</html>
